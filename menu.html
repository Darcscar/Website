<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Pedro's Classic and Asian Cuisine Menu - View our full menu with prices">
    <title>Menu | Pedro's Classic and Asian Cuisine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-red: #C41E3A;
            --dark-red: #8B0000;
            --gold: #D4AF37;
            --charcoal: #2C2C2C;
            --dark-bg: #1a1a1a;
            --orange: #E85D04;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        .menu-page {
            min-height: 100vh; width: 100%;
            flex-direction: column; padding: 1rem;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--charcoal) 100%);
            position: relative;
        }
        .menu-page::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary-red), var(--orange), var(--primary-red));
        }

        .page-header { text-align: center; padding: 0.75rem 0 1rem; border-bottom: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 0.75rem; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--gold); margin-bottom: 0.15rem; }
        .logo span { color: var(--primary-red); }
        .category-title { font-size: 1.5rem; color: white; margin-bottom: 0.15rem; }
        .category-subtitle { color: var(--orange); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; }

        .menu-items { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; overflow-y: auto; padding-bottom: 0.5rem; }
        .menu-item {
            background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 0.6rem;
            border-left: 3px solid var(--primary-red); transition: all 0.3s ease;
            display: flex; gap: 0.8rem; align-items: center;
        }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); border-left-color: var(--orange); }
        .menu-item-img { width: 85px; height: 85px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
        .menu-item-content { flex: 1; min-width: 0; }
        .menu-item-header { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
        .menu-item-name { font-weight: 600; font-size: 1.05rem; color: white; }
        .menu-item-price { font-weight: 700; color: var(--orange); white-space: nowrap; font-size: 1rem; }
        .menu-item-desc { font-size: 0.9rem; color: #aaa; line-height: 1.4; margin-top: 0.3rem; }

        .menu-item-multi .menu-item-content { display: flex; flex-wrap: wrap; align-items: baseline; }
        .menu-item-multi .menu-item-name { flex: 1; min-width: 0; }
        .menu-item-price-right { font-weight: 700; color: var(--orange); font-size: 0.9rem; text-align: right; }
        .menu-item-multi .menu-item-desc { width: 100%; }

        .section-title { font-size: 1rem; color: var(--orange); margin: 0.75rem 0 0.5rem; padding-bottom: 0.25rem; border-bottom: 1px dashed var(--orange); }
        .size-labels { display: flex; justify-content: flex-end; gap: 0.75rem; margin-bottom: 0; padding-right: 0.5rem; font-size: 0.8rem; color: var(--orange); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .pax-labels { display: flex; justify-content: flex-end; gap: 0.75rem; margin-bottom: 0.35rem; padding-right: 0.5rem; font-size: 0.55rem; color: var(--orange); opacity: 0.7; font-weight: 400; margin-top: -0.1rem; }

        .page-indicator { text-align: center; padding: 0.5rem 0; color: #666; font-size: 0.75rem; }
        .page-dots { display: flex; justify-content: center; gap: 0.5rem; margin-top: 0.25rem; }
        .page-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255, 255, 255, 0.3); }
        .page-dot.active { background: var(--orange); }
        .scroll-hint { text-align: center; color: var(--orange); font-size: 0.7rem; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } 60% { transform: translateY(-3px); } }

        .back-btn {
            position: fixed; top: 0.75rem; left: 0.75rem; background: var(--primary-red); color: white;
            border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1rem; cursor: pointer;
            z-index: 100; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); transition: all 0.3s ease;
        }
        .back-btn:hover { background: var(--dark-red); transform: scale(1.1); }

        .badge { display: inline-block; background: var(--orange); color: white; font-size: 0.55rem; padding: 0.1rem 0.3rem; border-radius: 3px; margin-left: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .freebie { display: block; color: var(--gold); font-size: 0.75rem; font-weight: 500; margin-top: 0.2rem; }

        .bento-item { border-left-color: var(--orange); }
        .bento-includes { display: flex; flex-direction: column; gap: 0.15rem; margin-top: 0.3rem; font-size: 0.75rem; color: #ccc; }
        .bento-line strong { color: var(--gold); font-weight: 600; margin-right: 0.2rem; }

        .page-tabs {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; background: var(--charcoal);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 100; padding: 0.5rem;
        }
        .page-tab {
            flex: 1; padding: 0.75rem 1rem; text-align: center;
            background: transparent; border: none; color: #888;
            font-family: 'Poppins', sans-serif; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s ease;
            border-radius: 8px; margin: 0 0.25rem;
        }
        .page-tab.active {
            background: var(--primary-red); color: white;
        }
        .page-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1); color: white;
        }

        .menu-page { display: none; padding-bottom: 4rem; }
        .menu-page.active { display: flex; }

        @media (min-width: 768px) {
            .menu-page { padding: 1.5rem 2rem; }
            .menu-items { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .section-title, .size-labels, .pax-labels { grid-column: span 2; }
            .category-title { font-size: 2rem; }
        }
        @media (max-height: 700px) {
            .menu-item { padding: 0.5rem 0.6rem; }
            .menu-item-name { font-size: 0.8rem; }
            .page-header { padding: 0.5rem 0 0.75rem; }
            .category-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn" title="Back to Home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>

    <div id="menu-container"></div>

    <div class="page-tabs">
        <button class="page-tab active" data-page="page1">Main Dishes</button>
        <button class="page-tab" data-page="page2">Sides & Drinks</button>
    </div>

    <script>
        const images = {
            "Pad Thai": "images/Asian/PAD THAI.jpg",
            "Lo Mein": "images/Asian/lo mien.png",
            "Beef Pho": "images/Asian/Beef Pho.jpg",
            "Tomyum": "images/Asian/tom yum.jpeg",
            "Spicy Oxtail Beef Pho": "images/Asian/spicy oxtail.jpeg",
            "House Special Noodles": "images/Asian/stirfry noodles.jpg",
            "Yangchow Rice With Lechon Kawali": "images/Best Seller/yangchow lechon kawali.png",
            "Chicken Fillet": "images/Fried Rice Meals/chicken fillet.jpg",
            "Pork Tonkatsu": "images/Fried Rice Meals/tonkatsu1.png",
            "BBQ Chicken Wings": "images/Fried Rice Meals/bbq egg fried.jpg",
            "Honey Butter Garlic Wings": "images/Fried Rice Meals/honey butter garlic wings.jpg",
            "Buffalo Wings": "images/Fried Rice Meals/spicy garlic wings.jpg",
            "Beef Gyudon": "images/Fried Rice Meals/beef gyudon.jpg",
            "Ham Katsu": "images/Fried Rice Meals/katsu ham.jpg",
            "Vietnamese Coffee": "images/Drinks/vietnamese coffee.jpg",
            "Coconut Coffee": "images/Drinks/vietnamese coffee.jpg",
            "Spicy Garlic Pork Thai Style": "images/Asian Stir Fry/spicy garlic pork thai style.jpg",
            "Orange Chicken": "images/Asian Stir Fry/Orange Chicken.jpg",
            "Lemon Chicken": "images/Asian Stir Fry/lemon chicken.jpg",
            "Pad Kra Pao": "images/Asian/Padkra Pao.jpg",
            "Sweet & Spicy Pork Ribs": "images/Asian Stir Fry/Spicy Pork Ribs.jpg",
            "Squid in Bell Pepper": "images/Asian Stir Fry/Squid and bell pepper.jpg",
            "Squid w/ Veggie": "images/Asian Stir Fry/Squid Veggie.jpg",
            "Krapao Moo Krob": "images/Asian Stir Fry/Krapao Moo Krob.jpg",
            "Kung Pao Chicken": "images/Asian Stir Fry/Kung Pao.jpg",
            "General Tso Chicken": "images/Asian Stir Fry/General Tso.jpg",
            "Spicy Garlic Wings": "images/Asian Stir Fry/spicy garlic wings.jpg",
            "Krapao Squid": "images/Asian Stir Fry/krapao squid.png",
            "Mapo Tofu": "images/Asian Stir Fry/mapo tofu.jpg",
            "Stir Fry Cabbage with Egg": "images/Asian Stir Fry/cabbage egg.jpg",
            "Nasi Goreng Chicken": "images/Fried Rice Solo/nasi goreng.jpg",
            "Nasi Goreng - Chicken": "images/Fried Rice Solo/nasi goreng.jpg",
            "Kimchi Fried Rice": "images/Fried Rice Solo/kimchi fried rice.jpg",
            "Yangchow Fried Rice - Chicken": "images/Fried Rice Solo/yangchow chicken.jpg",
            "Yangchow Fried Rice - Pork": "images/Fried Rice Solo/yangchow pork.jpg",
            "Egg Fried Rice": "images/Fried Rice Solo/egg fried rice.jpg",
            "Philly Cheesesteak": "images/Sandwich/philly.jpg",
            "General Tso's Bento": "images/Bento Deals/general tso bento.jpg",
            "Orange Chicken Bento": "images/Bento Deals/orange chicken bento.jpg",
            "Premium Ribs Bento": "images/Bento Deals/pork ribs bento.jpg"
        };

        const descriptions = {
            "Pad Thai": "Thai stir-fried rice noodles with egg, vegetables, and peanuts",
            "Lo Mein": "Stir-fried noodles with savory sauce, vegetables, and meat",
            "Beef Pho": "Vietnamese rice noodles in aromatic beef broth with fresh herbs",
            "Tomyum": "Hot and sour Thai soup with shrimp, herbs, and chili",
            "Spicy Oxtail Beef Pho": "Rich beef broth with tender oxtail, rice noodles, and a spicy kick",
            "House Special Noodles": "Wok-fried noodles with shrimp, squid, pork, and chicken",
            "Yangchow Rice With Lechon Kawali": "Crispy Thai-style pork belly with Yangchow or Kimchi Fried Rice",
            "Chicken Fillet": "Crispy chicken fillet on yangchow fried rice",
            "Pork Tonkatsu": "Crispy pork tonkatsu on yangchow fried rice",
            "BBQ Chicken Wings": "Juicy BBQ wings with savory egg fried rice",
            "Honey Butter Garlic Wings": "Sweet honey butter garlic wings with egg fried rice",
            "Buffalo Wings": "Tangy and spicy buffalo wings with egg fried rice",
            "Beef Gyudon": "Thinly sliced beef in savory-sweet soy sauce over rice",
            "Ham Katsu": "Crispy breaded ham cutlet on yangchow fried rice",
            "Vietnamese Coffee": "Deep roasted coffee served ice-cold, smooth and satisfying",
            "Coconut Coffee": "Rich coffee with a smooth tropical touch",
            "Peach Mango Soda": "Refreshing peach mango soda with mint garnish"
        };

        async function loadMenu() {
            try {
                const response = await fetch('menu-data.json');
                const data = await response.json();
                renderMenu(data);
            } catch (error) {
                console.error('Error loading menu:', error);
            }
        }

        function renderItem(item, priceType = 'simple') {
            const badge = item.badge ? `<span class="badge">${item.badge}</span>` : '';
            const freebie = item.freebie ? `<span class="freebie">${item.freebie}</span>` : '';
            const img = images[item.name];
            const desc = descriptions[item.name];
            const priceOnRight = priceType !== 'simple';

            let price;
            if (priceType === 'simple') {
                price = item.price;
            } else if (priceType === 'right') {
                price = item.price;
            } else if (priceType === 'stirfry') {
                price = `${item.withRice} | ${item.double}`;
            } else if (priceType === 'platter') {
                price = `${item.twoToThree} | ${item.threeToFive}`;
            } else if (priceType === 'grill') {
                price = `Half: ${item.half} | Whole: ${item.whole}`;
            }

            if (priceOnRight) {
                // Multi-price layout: name on left, prices on right (new line)
                if (img) {
                    return `<div class="menu-item menu-item-multi">
                        <img src="${img}" alt="${item.name}" class="menu-item-img">
                        <div class="menu-item-content">
                            <span class="menu-item-name">${item.name}${badge}</span>
                            <span class="menu-item-price-right">${price}</span>
                            ${desc ? `<p class="menu-item-desc">${desc}</p>` : ''}
                        </div>
                    </div>`;
                } else {
                    return `<div class="menu-item menu-item-multi">
                        <div class="menu-item-content">
                            <span class="menu-item-name">${item.name}${badge}</span>
                            <span class="menu-item-price-right">${price}</span>
                        </div>
                    </div>`;
                }
            } else {
                // Simple price layout
                if (img) {
                    return `<div class="menu-item">
                        <img src="${img}" alt="${item.name}" class="menu-item-img">
                        <div class="menu-item-content">
                            <div class="menu-item-header">
                                <span class="menu-item-name">${item.name}${badge}</span>
                                <span class="menu-item-price">${price}</span>
                            </div>
                            ${freebie}
                            ${desc ? `<p class="menu-item-desc">${desc}</p>` : ''}
                        </div>
                    </div>`;
                } else {
                    return `<div class="menu-item">
                        <div class="menu-item-content">
                            <div class="menu-item-header">
                                <span class="menu-item-name">${item.name}${badge}</span>
                                <span class="menu-item-price">${price}</span>
                            </div>
                            ${freebie}
                            ${desc ? `<p class="menu-item-desc">${desc}</p>` : ''}
                        </div>
                    </div>`;
                }
            }
        }

        function renderBentoItem(item) {
            const badge = item.badge ? `<span class="badge">${item.badge}</span>` : '';
            const mainKey = Array.isArray(item.includes.main) ? item.includes.main[0] : item.includes.main;
            const img = images[item.name] || images[mainKey];

            const mainText = Array.isArray(item.includes.main) ? item.includes.main.join(' / ') : item.includes.main;
            const sideText = Array.isArray(item.includes.side) ? item.includes.side.join(' or ') : item.includes.side;
            const drinkText = Array.isArray(item.includes.drink) ? item.includes.drink.join(', ') : item.includes.drink;

            const includesHtml = `
                <div class="bento-includes">
                    <span class="bento-line"><strong>Main:</strong> ${mainText}</span>
                    <span class="bento-line"><strong>Rice:</strong> ${Array.isArray(item.includes.rice) ? item.includes.rice.join(' or ') : item.includes.rice}</span>
                    <span class="bento-line"><strong>Side:</strong> ${sideText}</span>
                    <span class="bento-line"><strong>Soup:</strong> ${item.includes.soup}</span>
                    <span class="bento-line"><strong>Drink:</strong> ${drinkText}</span>
                </div>`;

            if (img) {
                return `<div class="menu-item bento-item">
                    <img src="${img}" alt="${item.name}" class="menu-item-img">
                    <div class="menu-item-content">
                        <div class="menu-item-header">
                            <span class="menu-item-name">${item.name}${badge}</span>
                            <span class="menu-item-price">${item.price}</span>
                        </div>
                        <p class="menu-item-desc">${item.description}</p>
                        ${includesHtml}
                    </div>
                </div>`;
            } else {
                return `<div class="menu-item bento-item">
                    <div class="menu-item-content">
                        <div class="menu-item-header">
                            <span class="menu-item-name">${item.name}${badge}</span>
                            <span class="menu-item-price">${item.price}</span>
                        </div>
                        <p class="menu-item-desc">${item.description}</p>
                        ${includesHtml}
                    </div>
                </div>`;
            }
        }

        function renderBentoSection(title, items) {
            let html = title ? `<h3 class="section-title">${title}</h3>` : '';
            items.forEach(item => html += renderBentoItem(item));
            return html;
        }

        function renderSection(title, items, priceType = 'simple', sizeLabels = null, paxLabels = null) {
            let html = title ? `<h3 class="section-title">${title}</h3>` : '';
            if (sizeLabels) html += `<div class="size-labels">${sizeLabels}</div>`;
            if (paxLabels) html += `<div class="pax-labels">${paxLabels}</div>`;
            items.forEach(item => html += renderItem(item, priceType));
            return html;
        }

        function renderMenu(data) {
            const container = document.getElementById('menu-container');

            // Page 1: Main Dishes
            let page1 = `<section class="menu-page" id="page1">
                <div class="page-header">
                    <div class="logo">Pedro's Classic and <span>Asian Cuisine</span></div>
                    <h1 class="category-title">Main Dishes</h1>
                    <p class="category-subtitle">Best Seller & Asian Favorites</p>
                </div>
                <div class="menu-items">
                    ${renderSection('Signature Fried Rice Collection', data.signatureFriedRiceCollection)}
                    ${renderBentoSection('Bento Boxes', data.bentoBoxes)}
                    ${renderSection('Wok Street Noodle House', data.wokStreetNoodleHouse)}
                    ${renderSection('Wok Tossed Specialties', data.wokTossedSpecialties, 'stirfry', 'w/Rice | Double', '&nbsp; | 2-3 pax')}
                </div>
                <div class="page-indicator">
                    <p style="color: var(--orange); font-size: 0.7rem;">Prices in PHP</p>
                </div>
            </section>`;

            // Page 2: Sides, Drinks & More
            let page2 = `<section class="menu-page" id="page2">
                <div class="page-header">
                    <div class="logo">Pedro's <span>Cuisine</span></div>
                    <h1 class="category-title">Sides, Drinks & More</h1>
                    <p class="category-subtitle">Rice, Beverages & Extras</p>
                </div>
                <div class="menu-items">
                    ${renderSection('Rice Bowls & Basics', data.riceBowlsAndBasics, 'right')}
                    ${renderSection('Sharing Platters', data.sharingPlatters, 'platter', '2-3 pax | 3-5 pax')}
                    ${renderSection('Flame Grill Selection', data.flameGrillSelection, 'grill')}
                    ${renderSection('Sandwich Atelier', data.sandwichAtelier)}
                    ${renderSection('Signature Rice Upgrades', data.signatureRiceUpgrades, 'right')}
                    ${renderSection('Refreshments & House Drinks', data.refreshmentsAndHouseDrinks, 'right')}
                </div>
                <div class="page-indicator">
                    <p style="color: var(--orange); font-size: 0.7rem;">Prices in PHP</p>
                </div>
            </section>`;

            container.innerHTML = page1 + page2;
            setupPageObserver();
            setupPageTabs();
        }

        function setupPageObserver() {
            // No longer needed with tab navigation
        }

        function setupPageTabs() {
            const tabs = document.querySelectorAll('.page-tab');
            const pages = document.querySelectorAll('.menu-page');

            // Show first page by default
            document.getElementById('page1').classList.add('active');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetPage = tab.dataset.page;

                    // Update tabs
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    // Update pages
                    pages.forEach(p => p.classList.remove('active'));
                    document.getElementById(targetPage).classList.add('active');

                    // Scroll to top
                    window.scrollTo(0, 0);
                });
            });
        }

        loadMenu();
    </script>
</body>
</html>
